name: user service pipeline
on:
  workflow_dispatch:
  pull_request:
    branches:
    - main
    paths:
    - 'src/user-service/**'

env:
  AWS_REGION: us-east-1

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@v6

    - name: setup-go
      uses: actions/setup-go@v6
      with:
        go-version: '1.22'

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.11
        working-directory: src/user-service/

    - name: test
      run: |
        go mod tidy
        go test ./...
      working-directory: src/user-service/

  ecr:
    runs-on: ubuntu-latest
    needs: tests 
    steps:
    - name: checkout
      uses: actions/checkout@v6

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, tag, and push image to Amazon ECR
      run: |
        cd src/user-service
        docker build -t ${{ secrets.ACC_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/taskflow-user:${{ github.run_number }} .
        docker push ${{ secrets.ACC_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/taskflow-user:${{ github.run_number }}

  update-image: 
    runs-on: ubuntu-latest
    needs: ecr
    steps:
    - name: checkout
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.GH_TOKEN }}
        ref: ${{ github.head_ref }}

    - run: |
        sed -i "s|image: .*|image: ${{ secrets.ACC_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/taskflow-user:${{ github.run_number }}|g" kubernetes/user-svc/deploy.yaml    

    - run: |
        TARGET_BRANCH="${{ github.head_ref || github.ref_name }}"
        git config --global user.name "abdelhadyi"
        git config --global user.email "abdelhady.elsayedd@gmail.com"
        git add kubernetes/user-svc/deploy.yaml
        git commit -m "update user-svc-image tag to ${{ github.run_number }} [skip ci]" --allow-empty
        git push origin "$TARGET_BRANCH" --force

