name: frontend pipeline
on:
  pull_request:
    branches: 
      - main
    paths: 
      - 'src/frontend/**'

env:
  AWS_REGION: us-east-1

jobs:
  Tests:
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@v4

    - name: setup-node
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: src/frontend/package-lock.json

    - name: test-build
      run: |
        npm install 
        npm test
        npm run build
      working-directory: src/frontend

  
  ecr:
    runs-on: ubuntu-latest
    needs: Tests
    steps:
    - name: checkout
      uses: actions/checkout@v6

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, tag, and push image to Amazon ECR
      run: |
        cd src/frontend
        docker build -t ${{ secrets.ACC_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/taskflow-frontend:${{ github.run_id }} .
        docker push ${{ secrets.ACC_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/taskflow-frontend:${{ github.run_id }}

  update-image:
    runs-on: ubuntu-latest
    needs: ecr
    steps:
    - name: checkout
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.GH_TOKEN }}
        ref: ${{ github.head_ref }}

    - name: update-deployment
      run: |
        sed -i "s|image: .*|image: ${{ secrets.ACC_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/taskflow-frontend:${{ github.run_id }}|g" kubernetes/frontend/deploy.yaml

    - name: git
      run: |
        git config --local user.email "abdelhady.elsayedd@gmail.com"
        git config --local user.name "abdelhadyi"
        git add kubernetes/frontend/deploy.yaml
        git commit -a -m "updating the image version to ${{ github.run_id }} [skip ci]"
        git push origin ${{ github.head_ref }}
