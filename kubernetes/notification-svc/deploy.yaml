apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskflow-notification-deployment
  namespace: taskflow
  labels:
    app: taskflow-notification
spec:
  replicas: 3
  selector:
    matchLabels:
      app: taskflow-notification
  template:
    metadata:
      labels:
        app: taskflow-notification
    spec:
      initContainers:
      - name: waitforpostgress
        image: busybox
        envFrom:
        - configMapRef:
            name: services-cm
        command: ['sh', '-c', 'until nc -z $DB_HOST 5432; do echo waiting; sleep 2; done']
      
      containers:
      - name: notifications-svc
        image: 
        
        env:
        - name: DB_NAME
          value: notifications_db
        
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: services-secret
              key: DB_PASSWORD
              
        readinessProbe:
          httpGet:
            path: /health
            port: 8004
          initialDelaySeconds: 5
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /health
            port: 8004
          initialDelaySeconds: 15
          periodSeconds: 20
    
        ports:
        - containerPort: 8004

