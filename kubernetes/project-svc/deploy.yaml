apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskflow-project-deployment
  namespace: taskflow
  labels:
    app: taskflow-project
spec:
  replicas: 3
  selector:
    matchLabels:
      app: taskflow-project
  template:
    metadata:
      labels:
        app: taskflow-project
    
    spec:
      initContainers:
      - name: waitforpostgress
        image: 383189130746.dkr.ecr.us-east-1.amazonaws.com/taskflow-project:27474256172
        envFrom:
        - configMapRef:
            name: services-cm
        command: ['sh', '-c', 'until nc -z $DB_HOST 5432; do echo waiting; sleep 2; done']
      
      containers:
      - name: project-svc
        image: 383189130746.dkr.ecr.us-east-1.amazonaws.com/taskflow-project:27474256172
        
        env:
        - name: DB_NAME
          value: projects_db
        
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: services-secret
              key: DB_PASSWORD        
        
        readinessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 5
          periodSeconds: 10
        
        livenessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 15
          periodSeconds: 20
          
        ports:
        - containerPort: 8002

